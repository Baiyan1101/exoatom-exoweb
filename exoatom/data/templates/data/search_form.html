<section class="search-panel" aria-labelledby="search-title">
    <h2 id="search-title">Search</h2>
    <form action="{% url 'wagtail_serve' '' %}" method="get" class="search-form">
        <label class="field" for="species">
            <span>Species</span>
            <input type="text" id="species" name="qf" autocomplete="off" placeholder="Search..." value="{% if request.GET.qf %}{{ request.GET.qf }}{% elif request.GET.q %}{{ request.GET.q }}{% endif %}">
        </label>

        <label class="checkbox-field" for="input_box_all_charges">
            <span>All ionization stages?</span>
            <input type="checkbox" id="input_box_all_charges" name="input_box_all_charges" value="true" {% if request.GET.input_box_all_charges or request.GET.all_charges %}checked{% endif %}>
        </label>

        <div class="actions">
            <button type="submit">Search</button>
            <button class="secondary" type="button" onclick="window.location.href = location.pathname;">Clear</button>
        </div>

        {% if request.GET.qf and not species and results|length == 0 %}
        <p class="empty search-empty">No matching species found.</p>
        {% endif %}
    </form>
</section>
